name: Agent Scan

on:
  pull_request:
    types: [opened]

jobs:
  agent_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Agent Scan
        uses: jhroemer/action-agent-scan@0.0.3
